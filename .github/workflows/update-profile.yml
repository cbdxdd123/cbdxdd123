name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Readme
        uses: metcalfc/chartgif-action@v4
        with:
          args: --save
        env:
          CHARTGIGITHUBTOKEN: ${{ secrets.GITHUB_TOKEN }}
